<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MahjongSoul Data Overlay</title>
    <link rel="stylesheet" href="./simple.css" />
  </head>
  <body>
    <main class="app simple">
      <section class="panel simple-panel">
        <p class="eyebrow">MahjongSoul Data Overlay</p>
        <h1>かんたん開始</h1>
        <div class="tab-row">
          <button class="tab-button is-active" data-tab-target="quick">かんたん開始</button>
          <button class="tab-button" data-tab-target="settings">設定</button>
          <button class="tab-button" data-tab-target="obs">OBS連携</button>
        </div>

        <section class="tab-panel is-active" data-tab-panel="quick">
          <p class="lead">順番に押すだけで準備できます。</p>
          <div class="status-line">
            <span>雀魂起動</span>
            <strong id="launch-status">停止中</strong>
          </div>
          <div class="status-line">
            <span>データ取得</span>
            <strong id="collect-status">停止中</strong>
          </div>
          <ol class="step-list">
            <li>
              <strong>1. 雀魂起動</strong>
              <div class="button-row">
                <button id="launch-start" class="primary">雀魂起動</button>
                <button id="launch-stop">停止</button>
              </div>
            </li>
            <li>
              <strong>2. データ取得開始</strong>
              <div class="button-row">
                <button id="collect-start" class="primary">データ取得開始</button>
                <button id="collect-stop" class="danger">停止</button>
              </div>
            </li>
            <li>
              <strong>3. OBS用のHTMLフォルダを開く</strong>
              <div class="button-row">
                <button id="open-html">OBS用HTMLフォルダを開く</button>
              </div>
            </li>
          </ol>
          <p class="hint" id="html-dir"></p>
        </section>

        <section class="tab-panel" data-tab-panel="settings">
          <p class="lead">役数カウントの範囲やリセット操作を行います。</p>
          <div class="settings-card">
            <p class="settings-label">役数の数え方</p>
            <label class="radio-row">
              <input type="radio" name="han-count-scope" value="all_players" />
              <span>全プレイヤー分をカウント</span>
            </label>
            <label class="radio-row">
              <input type="radio" name="han-count-scope" value="self_only" />
              <span>自分の和了のみカウント</span>
            </label>
            <label class="radio-row">
              <input type="radio" name="han-count-scope" value="self_with_ron_loss" />
              <span>自分の和了を加算し、放銃分を減算</span>
            </label>
          </div>
          <div class="button-row">
            <button id="save-settings" class="primary">設定を保存</button>
            <button id="reset-han">役数をリセット</button>
          </div>
          <div class="button-row">
            <button id="reset-records">順位をリセット</button>
            <button id="reset-points">ポイント基準値をリセット</button>
          </div>
          <p class="hint" id="settings-status"></p>
        </section>

        <section class="tab-panel" data-tab-panel="obs">
          <p class="lead">OBS WebSocket に接続し、リーチ演出のメディア再生を設定します。</p>
          <div class="status-line">
            <span>OBS 接続</span>
            <strong id="obs-status">未接続</strong>
          </div>
          <p class="hint" id="obs-status-message"></p>
          <div class="settings-card">
            <p class="settings-label">連携オン/オフ</p>
            <label class="checkbox-row">
              <input type="checkbox" id="obs-enabled" />
              <span>連携を有効にする</span>
            </label>
          </div>
          <div class="settings-card form-card">
            <label class="field-group">
              <span class="field-label">WebSocket URL</span>
              <input id="obs-websocket-url" type="text" placeholder="ws://127.0.0.1:4455" />
            </label>
            <label class="field-group">
              <span class="field-label">パスワード</span>
              <input id="obs-password" type="password" placeholder="未設定なら空欄" />
            </label>
            <label class="field-group">
              <span class="field-label">メディアソース名</span>
              <input
                id="obs-media-source-name"
                type="text"
                list="obs-input-list"
                placeholder="例: リーチ演出"
              />
              <datalist id="obs-input-list"></datalist>
            </label>
            <label class="field-group">
              <span class="field-label">OBS ソース一覧</span>
              <select id="obs-input-select">
                <option value="">ソース一覧を取得してください</option>
              </select>
            </label>
          </div>
          <div class="button-row">
            <button id="save-obs-settings" class="primary">OBS設定を保存</button>
            <button id="obs-connect">接続</button>
            <button id="obs-disconnect">切断</button>
            <button id="obs-refresh-inputs">ソース一覧を取得</button>
            <button id="obs-play-test">テスト再生</button>
          </div>
          <p class="hint" id="obs-settings-status"></p>
        </section>
      </section>
    </main>
    <script type="module" src="./collect-renderer.js"></script>
  </body>
</html>
